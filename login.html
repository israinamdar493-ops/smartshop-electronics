<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — SmartShop</title>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="navbar"></div>

<div class="auth-page">
    <div class="form-card">

        <!-- Logo -->
        <div style="text-align:center;margin-bottom:24px">
            <div style="font-size:2.5rem;margin-bottom:8px">⚡</div>
            <div style="font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;color:var(--blue)">SmartShop</div>
        </div>

        <!-- Tabs -->
        <div class="auth-tabs">
            <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Login</button>
            <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Register</button>
        </div>

        <!-- Alert -->
        <div id="authAlert" style="display:none"></div>

        <!-- LOGIN FORM -->
        <div id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" placeholder="you@example.com"/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password"
                       onkeydown="if(event.key==='Enter') doLogin()"/>
            </div>
            <button class="btn btn-primary btn-full btn-lg" onclick="doLogin()" id="loginBtn">
                Login →
            </button>
            <div class="form-link" style="margin-top:16px">
                <span style="font-size:.82rem;color:var(--text-s)">
                    Admin demo: admin@smartshop.com / admin123
                </span>
            </div>
        </div>

        <!-- REGISTER FORM -->
        <div id="registerForm" style="display:none">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="Your full name"/>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="regEmail" placeholder="you@example.com"/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword" placeholder="Minimum 6 characters"/>
            </div>
            <button class="btn btn-primary btn-full btn-lg"
                    onclick="doRegister()" id="registerBtn">
                Create Account →
            </button>
        </div>

    </div>
</div>

<script src="js/api.js"></script>
<script src="js/login.js"></script>
</body>
</html>
