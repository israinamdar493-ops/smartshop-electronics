<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Panel — SmartShop</title>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="navbar"></div>

<div class="admin-layout">
    <!-- Sidebar -->
    <div class="admin-sidebar">
        <h3>Admin Panel</h3>
        <div class="admin-nav-item active" onclick="showSection('products')">📦 Products</div>
        <div class="admin-nav-item" onclick="showSection('add')">➕ Add Product</div>
        <div class="admin-nav-item" onclick="showSection('stats')">📊 Stats</div>
        <div style="margin-top:auto;padding-top:20px;border-top:1px solid var(--border);margin-top:40px">
            <div class="admin-nav-item" onclick="logoutUser()" style="color:var(--red)">🚪 Logout</div>
        </div>
    </div>

    <!-- Main content -->
    <div class="admin-content">
        <div id="adminSection"></div>
    </div>
</div>

<!-- ADD/EDIT PRODUCT MODAL -->
<div class="modal-overlay" id="productModal" style="display:none">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="modalTitle">Add Product</div>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div id="modalAlert" style="display:none"></div>
        <input type="hidden" id="editProductId"/>
        <div class="form-row">
            <div class="form-group">
                <label>Product Name *</label>
                <input type="text" id="pName" placeholder="e.g. iPhone 15"/>
            </div>
            <div class="form-group">
                <label>Category *</label>
                <select id="pCategory">
                    <option value="">Select Category</option>
                    <option value="Mobile">📱 Mobile</option>
                    <option value="Laptop">💻 Laptop</option>
                    <option value="Wearables">⌚ Wearables</option>
                    <option value="Audio">🎧 Audio</option>
                    <option value="Accessories">🔌 Accessories</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Price (₹) *</label>
                <input type="number" id="pPrice" placeholder="e.g. 79999"/>
            </div>
            <div class="form-group">
                <label>Stock *</label>
                <input type="number" id="pStock" placeholder="e.g. 50"/>
            </div>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="pDescription" placeholder="Product description..."></textarea>
        </div>
        <div class="form-group">
            <label>Image URL</label>
            <input type="text" id="pImageUrl"
                   placeholder="https://via.placeholder.com/200"/>
        </div>
        <div style="display:flex;gap:10px;margin-top:8px">
            <button class="btn btn-primary btn-full" onclick="saveProduct()">
                💾 Save Product
            </button>
            <button class="btn btn-outline" onclick="closeModal()" style="min-width:100px">
                Cancel
            </button>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
